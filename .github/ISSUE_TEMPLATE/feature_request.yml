name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Feature ideas are welcome. I'll read and think them over, but I can't promise when—or if—something will be implemented.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do? What's awkward or missing today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other approaches.

  - type: dropdown
    id: audience
    attributes:
      label: Who benefits most?
      options:
        - Listeners
        - Broadcasters / DJs
        - Admins / operators
        - Discord users
        - Self-hosters
        - Everyone
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to help test this
        - label: I would be willing to open a pull request
