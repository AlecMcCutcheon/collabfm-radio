version: 2

# Version-update PRs are OFF. Dependabot security alerts still work via repo Settings → Code security.
#
# To turn weekly/monthly bump PRs back on, uncomment registries + updates below.
# `replaces-base: true` avoids "private_registry_config_not_found" for npm.pkg.github.com
# (this repo only uses public npm — no .npmrc needed when this block is active).
#
# registries:
#   npm-npmjs:
#     type: npm-registry
#     url: https://registry.npmjs.org
#     replaces-base: true
#
# updates:
#   - package-ecosystem: npm
#     directory: /backend
#     registries:
#       - npm-npmjs
#     schedule:
#       interval: monthly
#     open-pull-requests-limit: 2
#   - package-ecosystem: npm
#     directory: /frontend
#     registries:
#       - npm-npmjs
#     schedule:
#       interval: monthly
#     open-pull-requests-limit: 2
#
# github-actions version bumps were removed intentionally — they could not pass branch
# checks and spammed PRs. Re-add only if publish-ghcr.yml runs on pull_request too:
#
#   - package-ecosystem: github-actions
#     directory: /
#     schedule:
#       interval: monthly
